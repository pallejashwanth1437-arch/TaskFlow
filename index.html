<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks — Command Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C10; --surface:#12151C; --surface2:#171B24; --surface3:#1D212C;
    --border:#232733; --borderLight:#2C3140; --text:#EDEFF4; --muted:#9096AA; --faint:#5D6376;
    --brand:#5B5FEF; --brandLight:#8B8EF5; --brandDim:#3A3DAA; --amber:#F0A93A;
    --high:#F0464B; --medium:#F0A93A; --low:#45D8E0;
    --pending:#8790A8; --progress:#4C8DFF; --completed:#34D399;
  }
  *{box-sizing:border-box;}
  html{color-scheme:dark;}
  body{
    margin:0; font-family:'Inter',sans-serif; color:var(--text); background:var(--bg);
    background-image:
      radial-gradient(ellipse 900px 500px at 12% -10%, rgba(91,95,239,0.16), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(240,169,58,0.08), transparent 55%);
    background-attachment:fixed; -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .glass{background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06);}
  .wrap{max-width:1180px;margin:0 auto;padding:40px 24px 60px;}
  .header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .brand-row{display:flex;gap:12px;align-items:flex-start;}
  .logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brandDim));display:grid;place-items:center;box-shadow:0 8px 30px -8px rgba(91,95,239,0.4);flex-shrink:0;margin-top:2px;}
  h1{font-size:34px;font-weight:600;letter-spacing:-0.02em;margin:0;color:var(--text);}
  .subtitle{margin:2px 0 0;font-size:14px;color:var(--muted);}
  .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn{display:flex;align-items:center;gap:8px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;font-weight:500;padding:10px 14px;cursor:pointer;transition:all .15s;font-family:inherit;}
  .btn:hover{border-color:var(--borderLight);color:var(--text);}
  .btn-icon{width:42px;height:42px;padding:0;display:grid;place-items:center;}
  .toggle-group{display:flex;align-items:center;border-radius:14px;border:1px solid var(--border);background:var(--surface);padding:4px;}
  .toggle-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .toggle-btn.active{background:var(--brand);color:#fff;}
  .btn-primary{background:var(--brand);color:#fff;border:none;box-shadow:0 8px 30px -8px rgba(91,95,239,0.4);}
  .btn-primary:hover{background:var(--brandLight);color:#fff;}
  .kbd{margin-left:4px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);border-radius:6px;padding:2px 6px;font-size:10px;color:rgba(255,255,255,0.85);}

  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:32px;}
  @media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr);}}
  .card{border-radius:22px;padding:20px;box-shadow:0 4px 24px -8px rgba(0,0,0,0.5);transition:transform .3s;}
  .card:hover{transform:translateY(-2px);}
  .progress-card{display:flex;align-items:center;gap:20px;position:relative;overflow:hidden;grid-column:span 1;}
  .progress-card::before{content:'';position:absolute;top:-32px;right:-32px;width:128px;height:128px;border-radius:50%;background:rgba(91,95,239,0.2);filter:blur(40px);}
  .gauge-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--faint);}
  .gauge-value{font-size:18px;font-weight:600;margin:6px 0 2px;color:var(--text);}
  .gauge-sub{font-size:14px;color:var(--muted);}
  .stat-top{display:flex;align-items:center;justify-content:space-between;}
  .stat-icon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;}
  .stat-num{font-size:30px;font-weight:600;margin:14px 0 0;color:var(--text);}

  .filters{margin-top:32px;display:flex;flex-direction:column;gap:12px;}
  .filters-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:220px;max-width:320px;}
  .search-wrap input{width:100%;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 14px 10px 38px;font-size:14px;font-family:inherit;}
  .search-wrap input::placeholder{color:var(--faint);}
  .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
  select{appearance:none;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 32px 10px 14px;font-size:14px;font-family:inherit;cursor:pointer;}
  .select-wrap{position:relative;}
  .select-wrap svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--faint);}
  .chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--faint);}
  .chip{display:flex;align-items:center;gap:6px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;padding:7px 12px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .chip-dot{width:6px;height:6px;border-radius:50%;}
  .chip-clear{font-size:12px;font-weight:500;color:var(--faint);background:none;border:none;cursor:pointer;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:640px){.grid{grid-template-columns:1fr;}}
  .task{position:relative;border-radius:22px;border:1px solid var(--border);background:var(--surface);padding:20px;box-shadow:0 4px 24px -8px rgba(0,0,0,0.5);transition:all .25s;}
  .task:hover{transform:translateY(-3px);border-color:var(--borderLight);}
  .task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .task-title-row{display:flex;align-items:flex-start;gap:8px;}
  .task-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;line-height:1.4;color:var(--text);}
  .task-title.done{color:var(--faint);text-decoration:line-through;}
  .pin-btn{background:none;border:none;cursor:pointer;color:var(--faint);padding:6px;border-radius:8px;flex-shrink:0;}
  .pin-btn.pinned{color:var(--amber);}
  .task-desc{margin:8px 0 0;font-size:13px;line-height:1.6;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .task-desc.done{opacity:0.6;}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:600;}
  .badge-cat{border:1px solid var(--border);color:var(--muted);font-weight:500;}
  .badge-dot{width:6px;height:6px;border-radius:50%;}
  .task-foot{margin-top:16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;}
  .task-dates{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  .task-dates .overdue{color:var(--high);font-weight:600;}
  .task-actions{display:flex;align-items:center;gap:2px;}
  .icon-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .15s;}
  .icon-btn:hover{background:var(--surface3);color:var(--brandLight);}
  .icon-btn.danger:hover{background:rgba(240,70,75,0.1);color:var(--high);}
  .icon-btn.complete:hover{color:var(--completed);}
  .icon-btn.complete.active{color:var(--completed);}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;border-radius:22px;margin-top:24px;}
  .empty-icon{width:80px;height:80px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:grid;place-items:center;margin-bottom:24px;}
  .empty h3{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin:0;color:var(--text);}
  .empty p{margin:6px 0 0;font-size:14px;color:var(--muted);max-width:280px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;}
  .modal{width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-radius:22px;border:1px solid var(--borderLight);background:var(--surface2);padding:24px;}
  .modal-top{display:flex;align-items:center;justify-content:space-between;}
  .modal-top h2{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin:0;color:var(--text);}
  .close-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:none;border:none;cursor:pointer;color:var(--muted);}
  .close-btn:hover{background:var(--surface3);color:var(--text);}
  .field{margin-top:16px;}
  .field label{display:block;margin-bottom:6px;font-size:12px;font-weight:500;color:var(--muted);}
  .field input, .field textarea, .field select{width:100%;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 14px;font-size:14px;font-family:inherit;}
  .field textarea{resize:none;}
  .field.error input{border-color:var(--high);}
  .field-error{margin-top:4px;font-size:12px;color:var(--high);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .row2 .field{margin-top:0;}
  .pin-toggle{margin-top:16px;width:100%;display:flex;align-items:center;justify-content:space-between;border-radius:14px;border:1px solid var(--border);background:var(--surface);padding:10px 14px;cursor:pointer;font-family:inherit;color:var(--text);font-size:14px;}
  .pin-toggle-left{display:flex;align-items:center;gap:8px;}
  .switch{position:relative;width:36px;height:20px;border-radius:999px;background:var(--surface3);transition:background .15s;flex-shrink:0;}
  .switch.on{background:var(--brand);}
  .switch-dot{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;}
  .switch.on .switch-dot{left:18px;}
  .modal-foot{margin-top:24px;display:flex;align-items:center;justify-content:flex-end;gap:8px;}
  .btn-ghost{border-radius:14px;border:1px solid var(--border);background:none;color:var(--muted);font-size:14px;font-weight:500;padding:10px 16px;cursor:pointer;font-family:inherit;}
  .btn-ghost:hover{color:var(--text);}

  .delete-icon{width:44px;height:44px;border-radius:50%;background:rgba(240,70,75,0.12);display:grid;place-items:center;}
  .btn-danger{border-radius:14px;border:none;background:var(--high);color:#fff;font-size:14px;font-weight:600;padding:10px 16px;cursor:pointer;font-family:inherit;}
  .btn-danger:hover{filter:brightness(1.1);}

  .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;display:none;place-items:center;border:none;cursor:pointer;box-shadow:0 8px 30px -8px rgba(91,95,239,0.4);}
  @media(max-width:640px){.fab{display:grid;}}

  .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:60;}
  .toast{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:toastIn .2s ease-out;}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .footer{margin-top:48px;border-top:1px solid var(--border);padding-top:20px;text-align:center;}
  .footer span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--faint);}

  .fadeUp{animation:fadeUp .35s ease-out both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .skel{background:var(--surface2);border-radius:10px;position:relative;overflow:hidden;}
  .skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);animation:shimmer 1.6s infinite;}
  @keyframes shimmer{100%{transform:translateX(100%);}}
</style>
</head>

  check:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  trash:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  alertBig:'<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  danger:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
};

function fmtShort(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isOverdue(due, status){ if(!due||status==='completed') return false; const t=new Date(); t.setHours(0,0,0,0); return new Date(due)<t; }

const PRIORITY_COLORS = {high:'#F0464B', medium:'#F0A93A', low:'#45D8E0'};
const PRIORITY_LABELS = {high:'High', medium:'Medium', low:'Low'};
const STATUS_COLORS = {pending:'#8790A8', 'in-progress':'#4C8DFF', completed:'#34D399'};
const STATUS_LABELS = {pending:'Pending', 'in-progress':'In Progress', completed:'Completed'};

function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

function getStats(){
  return {
    total: tasks.length,
    completed: tasks.filter(t=>t.status==='completed').length,
    pending: tasks.filter(t=>t.status==='pending').length,
    inProgress: tasks.filter(t=>t.status==='in-progress').length,
  };
}

function getFiltered(){
  let r = [...tasks];
  const f = state.filters;
  if(f.search.trim()){
    const q = f.search.toLowerCase();
    r = r.filter(t => t.title.toLowerCase().includes(q) || t.description.toLowerCase().includes(q));
  }
  if(f.status !== 'all') r = r.filter(t => t.status === f.status);
  if(f.priorities.length > 0) r = r.filter(t => f.priorities.includes(t.priority));
  const order = {high:0, medium:1, low:2};
  r.sort((a,b)=>{
    if(a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    switch(f.sort){
      case 'oldest': return new Date(a.createdDate)-new Date(b.createdDate);
      case 'dueDate': return new Date(a.dueDate)-new Date(b.dueDate);
      case 'priority': return order[a.priority]-order[b.priority];
      case 'alphabetical': return a.title.localeCompare(b.title);
      default: return new Date(b.createdDate)-new Date(a.createdDate);
    }
  });
  return r;
}

function render(){
  const app = document.getElementById('app');
  const stats = getStats();
  app.innerHTML = renderHeader() + renderStats(stats) + renderFilters() + renderGrid() + renderFooter() + renderFab() + renderModal() + renderDeleteModal();
  attachEvents();
}

function renderHeader(){
  return `
  <div class="header">
    <div class="brand-row">
      <div class="logo">${ICONS.radar}</div>
      <div>
        <h1 class="display">Tasks</h1>
        <p class="subtitle">Your command deck for getting things done</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="importBtn">${ICONS.upload}<span>Import</span></button>
      <div class="toggle-group">
        <button class="toggle-btn ${state.view==='grid'?'active':''}" data-view="grid">${ICONS.grid}</button>
        <button class="toggle-btn ${state.view==='list'?'active':''}" data-view="list">${ICONS.list}</button>
      </div>
      <button class="btn btn-icon" id="dimBtn">${state.dim ? ICONS.sun : ICONS.moon}</button>
      <button class="btn btn-primary" id="newTaskBtn">${ICONS.plus}New Task<span class="kbd mono">Ctrl+N</span></button>
    </div>
  </div>`;
}

function renderGauge(pct){
  const size=108, stroke=8, r=(size-stroke)/2, circ=2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  let ticks = '';
  for(let i=0;i<36;i++){
    const angle = (i/36)*360;
    const major = i%3===0;
    const r1 = r+stroke/2+2, r2 = r1+(major?5:2.5);
    const rad = angle*Math.PI/180;
    const cx=size/2, cy=size/2;
    ticks += `<line x1="${cx+r1*Math.cos(rad)}" y1="${cy+r1*Math.sin(rad)}" x2="${cx+r2*Math.cos(rad)}" y2="${cy+r2*Math.sin(rad)}" stroke="#232733" stroke-width="1"/>`;
  }
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    ${ticks}
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1D212C" stroke-width="${stroke}"/>
    <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B8EF5"/><stop offset="100%" stop-color="#F0A93A"/></linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#gg)" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)"/>
  </svg>`;
}

function renderStats(stats){
  const pct = stats.total>0 ? Math.round(stats.completed/stats.total*100) : 0;
  const cards = [
    {label:'Total Tasks', val:stats.total, color:'#8B8EF5', bg:'rgba(91,95,239,0.12)', icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8EF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>'},
    {label:'Pending', val:stats.pending, color:'#8790A8', bg:'rgba(135,144,168,0.12)', icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8790A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" stroke-dasharray="4 3"/></svg>'},
    {label:'In Progress', val:stats.inProgress, color:'#4C8DFF', bg:'rgba(76,141,255,0.12)', icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4C8DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>'},
    {label:'Completed', val:stats.completed, color:'#34D399', bg:'rgba(52,211,153,0.12)', icon:ICONS.check.replace('currentColor','#34D399')},
  ];
  return `<div class="stats fadeUp">
    <div class="card glass progress-card">
      ${renderGauge(pct)}
      <div>
        <p class="gauge-label">Completion</p>
        <p class="gauge-value display">${stats.completed} of ${stats.total}</p>
        <p class="gauge-sub">tasks completed</p>
      </div>
    </div>
    ${cards.map(c=>`
      <div class="card glass">
        <div class="stat-top">
          <span class="gauge-label">${c.label}</span>
          <div class="stat-icon" style="background:${c.bg}">${c.icon}</div>
        </div>
        <p class="stat-num display">${c.val}</p>
      </div>`).join('')}
  </div>`;
}

function renderFilters(){
  const f = state.filters;
  const chips = [
    {v:'high', l:'High', c:PRIORITY_COLORS.high},
    {v:'medium', l:'Medium', c:PRIORITY_COLORS.medium},
    {v:'low', l:'Low', c:PRIORITY_COLORS.low},
  ];
  return `<div class="filters">
    <div class="filters-row">
      <div class="search-wrap">
        <span class="search-icon">${ICONS.search}</span>
        <input type="text" id="searchInput" placeholder="Search tasks..." value="${f.search.replace(/"/g,'&quot;')}"/>
      </div>
      <div class="select-wrap">
        <select id="statusSelect">
          <option value="all" ${f.status==='all'?'selected':''}>All</option>
          <option value="pending" ${f.status==='pending'?'selected':''}>Pending</option>
          <option value="in-progress" ${f.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="completed" ${f.status==='completed'?'selected':''}>Completed</option>
        </select>
        ${ICONS.chevron}
      </div>
      <div class="select-wrap" style="margin-left:auto">
        <select id="sortSelect">
          <option value="newest" ${f.sort==='newest'?'selected':''}>Sort: Newest First</option>
          <option value="oldest" ${f.sort==='oldest'?'selected':''}>Sort: Oldest First</option>
          <option value="dueDate" ${f.sort==='dueDate'?'selected':''}>Sort: Due Date</option>
          <option value="priority" ${f.sort==='priority'?'selected':''}>Sort: Priority</option>
          <option value="alphabetical" ${f.sort==='alphabetical'?'selected':''}>Sort: Alphabetical</option>
        </select>
        ${ICONS.chevron}
      </div>
    </div>
    <div class="chips">
      <span class="chip-label">Priority</span>
      ${chips.map(c=>{
        const active = f.priorities.includes(c.v);
        return `<button class="chip" data-priority="${c.v}" style="border-color:${active?c.c:'#232733'};background:${active?c.c+'1A':'transparent'};color:${active?c.c:'#9096AA'}">
          <span class="chip-dot" style="background:${c.c}"></span>${c.l}
        </button>`;
      }).join('')}
      ${f.priorities.length>0 ? `<button class="chip-clear" id="clearPriorities">Clear</button>` : ''}
    </div>
  </div>`;
}

function renderTaskCard(t){
  const overdue = isOverdue(t.dueDate, t.status);
  const done = t.status === 'completed';
  const pc = PRIORITY_COLORS[t.priority];
  return `<div class="task fadeUp" style="box-shadow:0 4px 24px -8px rgba(0,0,0,0.5)">
    <div class="task-top">
      <div class="task-title-row">
        ${t.pinned ? `<span style="margin-top:3px;color:${PRIORITY_COLORS.medium}">${ICONS.pin.replace('currentColor','#F0A93A')}</span>` : ''}
        <h3 class="task-title display ${done?'done':''}">${escapeHtml(t.title)}</h3>
      </div>
      <button class="pin-btn ${t.pinned?'pinned':''}" data-pin="${t.id}">${ICONS.pin}</button>
    </div>
    <p class="task-desc ${done?'done':''}">${escapeHtml(t.description)}</p>
    <div class="badges">
      <span class="badge badge-cat">${t.category}</span>
      <span class="badge" style="color:${pc};background:${pc}1A"><span class="badge-dot" style="background:${pc}"></span>${PRIORITY_LABELS[t.priority]}</span>
      <span class="badge" style="color:${STATUS_COLORS[t.status]};background:${STATUS_COLORS[t.status]}1A">${STATUS_LABELS[t.status]}</span>
    </div>
    <div class="task-foot">
      <div class="task-dates mono">
        <span class="${overdue?'overdue':''}">${overdue?ICONS.alert:ICONS.calendar} Due ${fmtShort(t.dueDate)}${overdue?' · Overdue':''}</span>
        <span>Created ${fmtShort(t.createdDate)}</span>
      </div>
      <div class="task-actions">
        <button class="icon-btn" data-edit="${t.id}">${ICONS.edit}</button>
        <button class="icon-btn complete ${done?'active':''}" data-complete="${t.id}">${ICONS.check}</button>
        <button class="icon-btn danger" data-delete="${t.id}">${ICONS.trash}</button>
      </div>
    </div>
  </div>`;
}

function renderGrid(){
  const filtered = getFiltered();
  if(filtered.length === 0){
    return `<div class="empty glass fadeUp">
      <div class="empty-icon">${ICONS.radar.replace('white','#5D6376').replace('20','30').replace('20','30')}</div>
      <h3 class="display">No tasks found</h3>
      <p>Create your first task to get started.</p>
      <button class="btn btn-primary" style="margin-top:24px" id="emptyNewTaskBtn">${ICONS.plus}Create Task</button>
    </div>`;
  }
  return `<div class="grid" style="${state.view==='list'?'grid-template-columns:1fr':''}">${filtered.map(renderTaskCard).join('')}</div>`;
}

function renderFooter(){
  return `<div class="footer"><span class="mono">Tasks — command deck v1.0</span></div>`;
}

function renderFab(){
  return `<button class="fab" id="fabBtn">${ICONS.plus}</button>`;
}

function renderModal(){
  if(state.modal !== 'task') return '';
  const t = state.editingTask || {title:'',description:'',category:CATEGORIES[0],priority:'medium',status:'pending',dueDate:'',pinned:false};
  return `<div class="modal-overlay" id="modalOverlay">
    <form class="modal" id="taskForm">
      <div class="modal-top">
        <h2 class="display">${state.editingTask ? 'Edit Task' : 'New Task'}</h2>
        <button type="button" class="close-btn" id="closeModal">${ICONS.x}</button>
      </div>
      <div class="field" id="titleField">
        <label>Title</label>
        <input id="fTitle" value="${escapeAttr(t.title)}" placeholder="e.g. Ship the onboarding redesign" autofocus/>
        <div class="field-error" id="titleError" style="display:none">Title is required</div>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="fDesc" rows="3" placeholder="Add more detail...">${escapeHtml(t.description)}</textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Category</label>
          <select id="fCategory">${CATEGORIES.map(c=>`<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="fPriority">
            <option value="high" ${t.priority==='high'?'selected':''}>High</option>
            <option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
            <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Status</label>
          <select id="fStatus">
            <option value="pending" ${t.status==='pending'?'selected':''}>Pending</option>
            <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
            <option value="completed" ${t.status==='completed'?'selected':''}>Completed</option>
          </select>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input type="date" id="fDue" value="${t.dueDate||''}"/>
        </div>
      </div>
      <button type="button" class="pin-toggle" id="pinToggleBtn" data-pinned="${t.pinned}">
        <span class="pin-toggle-left"><span style="color:${t.pinned?'#F0A93A':'#5D6376'}">${ICONS.pin}</span>Pin task</span>
        <span class="switch ${t.pinned?'on':''}" id="pinSwitch"><span class="switch-dot"></span></span>
      </button>
      <div class="modal-foot">
        <button type="button" class="btn-ghost" id="cancelModal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Task</button>
      </div>
    </form>
  </div>`;
}

function renderDeleteModal(){
  if(state.modal !== 'delete') return '';
  const t = state.deleteTarget;
  return `<div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width:380px">
      <div class="delete-icon" style="color:#F0464B">${ICONS.danger}</div>
      <h2 class="display" style="margin-top:16px">Delete Task?</h2>
      <p style="margin-top:6px;font-size:14px;line-height:1.6;color:var(--muted)">Are you sure you want to delete "${escapeHtml(t.title)}"? This action cannot be undone.</p>
      <div class="modal-foot">
        <button class="btn-ghost" id="cancelDelete">Cancel</button>
        <button class="btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>`;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

function attachEvents(){
  document.getElementById('newTaskBtn').onclick = () => openNewTask();
  document.getElementById('importBtn').onclick = () => toast('Import is a UI placeholder in this demo');
  document.getElementById('dimBtn').onclick = () => { state.dim = !state.dim; document.body.style.filter = state.dim ? 'brightness(0.85)' : ''; render(); };
  document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => { state.view = b.dataset.view; render(); });

  const emptyBtn = document.getElementById('emptyNewTaskBtn');
  if(emptyBtn) emptyBtn.onclick = () => openNewTask();
  const fab = document.getElementById('fabBtn');
  if(fab) fab.onclick = () => openNewTask();

  document.getElementById('searchInput').oninput = (e) => { state.filters.search = e.target.value; render(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').selectionStart = document.getElementById('searchInput').value.length; };
  document.getElementById('statusSelect').onchange = (e) => { state.filters.status = e.target.value; render(); };
  document.getElementById('sortSelect').onchange = (e) => { state.filters.sort = e.target.value; render(); };
  document.querySelectorAll('[data-priority]').forEach(b => b.onclick = () => {
    const v = b.dataset.priority;
    const idx = state.filters.priorities.indexOf(v);
    if(idx>-1) state.filters.priorities.splice(idx,1); else state.filters.priorities.push(v);
    render();
  });
  const clearP = document.getElementById('clearPriorities');
  if(clearP) clearP.onclick = () => { state.filters.priorities = []; render(); };

  document.querySelectorAll('[data-pin]').forEach(b => b.onclick = () => {
    const t = tasks.find(x=>x.id===b.dataset.pin); t.pinned = !t.pinned; render();
  });
  document.querySelectorAll('[data-complete]').forEach(b => b.onclick = () => {
    const t = tasks.find(x=>x.id===b.dataset.complete); t.status = t.status==='completed' ? 'pending' : 'completed'; render();
  });
  document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    state.editingTask = tasks.find(x=>x.id===b.dataset.edit); state.modal = 'task'; render();
  });
  document.querySelectorAll('[data-delete]').forEach(b => b.onclick = () => {
    state.deleteTarget = tasks.find(x=>x.id===b.dataset.delete); state.modal = 'delete'; render();
  });

  const overlay = document.getElementById('modalOverlay');
  if(overlay){
    overlay.onclick = (e) => { if(e.target===overlay) closeModal(); };
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('cancelModal').onclick = closeModal;
    document.getElementById('pinToggleBtn').onclick = (e) => {
      const btn = e.currentTarget;
      const pinned = btn.dataset.pinned !== 'true';
      btn.dataset.pinned = pinned;
      document.getElementById('pinSwitch').className = 'switch' + (pinned?' on':'');
    };
    document.getElementById('taskForm').onsubmit = (e) => {
      e.preventDefault();
      const title = document.getElementById('fTitle').value.trim();
      if(!title){
        document.getElementById('titleField').classList.add('error');
        document.getElementById('titleError').style.display = 'block';
        return;
      }
      const form = {
        title,
        description: document.getElementById('fDesc').value,
        category: document.getElementById('fCategory').value,
        priority: document.getElementById('fPriority').value,
        status: document.getElementById('fStatus').value,
        dueDate: document.getElementById('fDue').value,
        pinned: document.getElementById('pinToggleBtn').dataset.pinned === 'true',
      };
      if(state.editingTask){
        Object.assign(state.editingTask, form);
        toast('Task updated');
      } else {
        tasks.unshift({...form, id:'t-'+(idCounter++), createdDate: new Date().toISOString().slice(0,10)});
        toast('Task created');
      }
      closeModal();
    };
  }

  const delOverlay = document.getElementById('deleteOverlay');
  if(delOverlay){
    delOverlay.onclick = (e) => { if(e.target===delOverlay) closeModal(); };
    document.getElementById('cancelDelete').onclick = closeModal;
    document.getElementById('confirmDelete').onclick = () => {
      tasks = tasks.filter(t => t.id !== state.deleteTarget.id);
      toast('Task deleted');
      closeModal();
    };
  }
}

function openNewTask(){ state.editingTask = null; state.modal = 'task'; render(); }
function closeModal(){ state.modal = null; state.editingTask = null; state.deleteTarget = null; render(); }

document.addEventListener('keydown', (e) => {
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n'){
    e.preventDefault();
    openNewTask();
  }
  if(e.key === 'Escape' && state.modal) closeModal();
});

render();
setTimeout(() => { state.loading = false; render(); }, 100);
</script>
</body>
</html>
